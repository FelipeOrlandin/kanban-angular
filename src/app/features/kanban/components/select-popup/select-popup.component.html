<div class="select-popup">
  <div class="select-popup__trigger" (click)="toggle(); $event.stopPropagation()">
    <ng-content></ng-content>
  </div>
</div>

<ng-template #dropdownTemplate>
  <div class="select-popup__dropdown" [class.select-popup__dropdown--top]="position === 'top'">
    @for (option of options; track option.value) {
      <button
        type="button"
        class="select-popup__option"
        [class.select-popup__option--active]="option.value === currentValue"
        [style.--option-color]="option.color"
        (click)="select(option.value, $event)"
      >
        <i class="bx" [ngClass]="option.icon"></i>
        <span>{{ option.label }}</span>
        @if (option.value === currentValue) {
          <i class='bx bx-check select-popup__check'></i>
        }
      </button>
    }
  </div>
</ng-template>
