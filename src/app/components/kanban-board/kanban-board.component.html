<div class="kanban-board">
  <header class="kanban-board__header">
    <div class="kanban-board__header-left">
      <h1 class="kanban-board__title">Kanban Board</h1>
    </div>
    <div class="kanban-board__header-right">
      <button class="kanban-board__theme-toggle" (click)="toggleTheme()" type="button">
        @if (!isDarkMode) {
          <i class='bx bx-moon'></i> Dark
        } @else {
          <i class='bx bx-sun'></i> Light
        }
      </button>
    </div>
  </header>

  <form class="kanban-board__form" (ngSubmit)="onAddTask()">
    <input
      type="text"
      class="kanban-board__input"
      placeholder="Título da tarefa *"
      [(ngModel)]="newTitle"
      name="title"
      required
    />
    <input
      type="text"
      class="kanban-board__input"
      placeholder="Descrição (opcional)"
      [(ngModel)]="newDescription"
      name="description"
    />
    <button type="submit" class="kanban-board__submit" [disabled]="!newTitle.trim()">
      + Adicionar
    </button>
  </form>

  <div class="kanban-board__toolbar">
    <div class="kanban-board__toolbar-left">
      <i class='bx bx-search'></i>
      <input
        type="search"
        class="kanban-board__search"
        placeholder="Buscar tarefa..."
        [(ngModel)]="searchText"
        name="search"
      />
    </div>
    <div class="kanban-board__toolbar-right">
      <select class="kanban-board__sort" [(ngModel)]="sortMode" name="sort">
        @for (option of sortOptions; track option.value) {
          <option [value]="option.value">{{ option.label }}</option>
        }
      </select>
    </div>
  </div>

  <p class="kanban-board__counter">
    <i class='bx bx-bar-chart'></i> {{ visibleTaskCount }} de {{ totalTaskCount }} tarefas
    @if (!isDragEnabled) {
      <span class="kanban-board__counter-hint">
        <i class='bx bx-block'></i> arrastar desabilitado
      </span>
    }
  </p>

  <div class="kanban-board__columns" cdkDropListGroup>
    @for (column of columns; track column.status) {
      <app-kanban-column
        [title]="column.title"
        [status]="column.status"
        [tasks]="filteredAndSortedTasksByColumn[column.status]"
        [dragDisabled]="!isDragEnabled"
        (deleteTask)="onDeleteTask($event)"
        (moveForward)="onMoveForward($event)"
        (moveBack)="onMoveBack($event)"
        (updateTask)="onUpdateTask($event)"
        (dropped)="onColumnDrop()"
      />
    }
  </div>
</div>
